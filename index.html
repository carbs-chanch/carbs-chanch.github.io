<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hmm I wonder</title>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Sacramento', cursive;
    text-align: center;
    background: #635920;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  img {
    max-width: 40%;
    margin-top: 50px;
    border-radius: 15px;
    box-shadow: 0 0 20px #473B0C;
  }

  .buttons {
    margin-top: 40px;
    position: relative;
    height: 100px;
  }

  button {
    font-size: 1.5rem;
    padding: 15px 30px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 12px;
    transition: all 0.2s;
    box-shadow: 0 0 20px #473B0C;
  }

  #yes {
    background-color: #473B0C;
    color: white;
  }

  #no {
    background-color: #8C7A53;
    color: white;
    position: absolute;
  }

  #yay {
    display: none;
    font-size: 2.5rem;
    margin-top: 50px;
    color: #8CAA63;
    animation: pop 0.5s ease forwards;
    text-shadow: 2px 2px #000000, 0 0 15px #000000, 0 0 30px #000000;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(-45deg);
    animation: float 60s linear infinite;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
  }

  .heart::before { top: -10px; left: 0; }
  .heart::after { left: 10px; top: 0; }

  @keyframes float {
    0% { transform: translateY(0) rotate(-45deg); opacity: 1; }
    100% { transform: translateY(-600px) rotate(-45deg); opacity: 0; }
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: red;
    opacity: 0.7;
    transform: rotate(45deg);
    animation: fall 5s linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<img src="poster.jpg" alt="Promposal Poster">

<div class="buttons">
  <button id="yes">Yes!</button>
  <button id="no">No!</button>
</div>

<div id="yay">
  <p>HOORAY I WIN GUYS 😎</p>
  <p>(i'm paying for ur ticket btw)</p>
  <p>i love you &lt;3</p>
</div>

<script>
const noBtn = document.getElementById('no');
const yesBtn = document.getElementById('yes');
const yay = document.getElementById('yay');

noBtn.addEventListener('mouseenter', () => {
  // Move left or right depending on current position
  let currentLeft = noBtn.offsetLeft;
  const moveBy = 100; // pixels
  const maxRight = window.innerWidth - noBtn.offsetWidth - 20;
  let newLeft = currentLeft + moveBy;
  if (newLeft > maxRight) newLeft = 20; // wrap around
  noBtn.style.transition = 'left 0.3s';
  noBtn.style.left = newLeft + 'px';
});
  
// Celebration on "Yes"
yesBtn.addEventListener('click', () => {
  document.querySelector('img').style.display = 'none';
  document.querySelector('.buttons').style.display = 'none';
  yay.style.display = 'block';
  createHearts(30);
  createConfetti(50);
});

// Floating hearts
function createHearts(num) {
  for (let i = 0; i < num; i++) {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.animationDuration = (2 + Math.random() * 3) + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 100000);
  }
}

// Confetti
function createConfetti(num) {
  const colors = ['#ff69b4', '#ff1493', '#ffb6c1', '#ffc0cb', '#ff00ff'];
  for (let i = 0; i < num; i++) {
    const confetti = document.createElement('div');
    confetti.classList.add('confetti');
    confetti.style.left = Math.random() * window.innerWidth + 'px';
    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDuration = (2 + Math.random() * 3) + 's';
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 4000);
  }
}
</script>

</body>
</html>
